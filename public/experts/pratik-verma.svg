<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#2a1f0f"/>
      <stop offset="100%" stop-color="#0D0C0A"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C4622D" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#C4622D" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <rect width="400" height="400" fill="url(#bg)"/>
    <circle cx="200" cy="200" r="200" fill="url(#glow)"/>
    <!-- Subtle grid lines -->
    <line x1="0" y1="133" x2="400" y2="133" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    <line x1="0" y1="266" x2="400" y2="266" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    <line x1="133" y1="0" x2="133" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    <line x1="266" y1="0" x2="266" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    <!-- Accent ring -->
    <circle cx="200" cy="200" r="130" fill="none" stroke="#C4622D" stroke-opacity="0.15" stroke-width="1"/>
    <circle cx="200" cy="200" r="155" fill="none" stroke="#C4622D" stroke-opacity="0.07" stroke-width="1"/>
    <!-- Initials -->
    <text x="200" y="230" font-family="Georgia, serif" font-size="120" font-weight="700" fill="#F0EBE1" text-anchor="middle" letter-spacing="-4">PV</text>
    <!-- Rust accent bar -->
    <rect x="160" y="255" width="80" height="2" fill="#C4622D" opacity="0.8"/>
  </g>
</svg>
