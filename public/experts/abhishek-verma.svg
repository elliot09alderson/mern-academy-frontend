<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg2" cx="60%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0f1a2a"/>
      <stop offset="100%" stop-color="#0D0C0A"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a7ab5" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4a7ab5" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle2">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
  </defs>
  <g clip-path="url(#circle2)">
    <rect width="400" height="400" fill="url(#bg2)"/>
    <circle cx="200" cy="200" r="200" fill="url(#glow2)"/>
    <!-- Subtle grid lines -->
    <line x1="0" y1="133" x2="400" y2="133" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    <line x1="0" y1="266" x2="400" y2="266" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    <line x1="133" y1="0" x2="133" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    <line x1="266" y1="0" x2="266" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    <!-- Accent ring -->
    <circle cx="200" cy="200" r="130" fill="none" stroke="#F0EBE1" stroke-opacity="0.1" stroke-width="1"/>
    <circle cx="200" cy="200" r="155" fill="none" stroke="#F0EBE1" stroke-opacity="0.05" stroke-width="1"/>
    <!-- Initials -->
    <text x="200" y="230" font-family="Georgia, serif" font-size="120" font-weight="700" fill="#F0EBE1" text-anchor="middle" letter-spacing="-4">AV</text>
    <!-- Cream accent bar -->
    <rect x="160" y="255" width="80" height="2" fill="#F0EBE1" opacity="0.4"/>
  </g>
</svg>
